<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 图片生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            display: none;
        }
        
        .result-section.active {
            display: block;
        }
        
        .image-container {
            text-align: center;
            margin-top: 20px;
        }
        
        .image-container img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #666;
            font-size: 18px;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .error.active {
            display: block;
        }
        
        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        .download-btn:hover {
            background: #45a049;
        }
        
        .api-config {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .api-config code {
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 AI 图片生成</h1>
        
        <div class="card">
            <div class="api-config">
                <strong>API 端点:</strong> <code>https://token.sensenova.cn/v1</code>
            </div>
            
            <div class="form-group">
                <label for="prompt">描述你想生成的图片：</label>
                <textarea id="prompt" placeholder="例如：一只可爱的猫咪在花园里玩耍，阳光明媚，色彩鲜艳..."></textarea>
            </div>
            
            <button class="btn" id="generateBtn" onclick="generateImage()">
                ✨ 生成图片
            </button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="loading-text">正在生成图片，请稍候...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="card result-section" id="result">
            <h2 style="margin-bottom: 20px; color: #333;">🖼️ 生成结果</h2>
            <div class="image-container">
                <img id="generatedImage" src="" alt="生成的图片">
            </div>
            <div style="text-align: center;">
                <a id="downloadBtn" class="download-btn" download>📥 下载图片</a>
            </div>
        </div>
    </div>
    
    <script>
        const API_ENDPOINT = 'https://token.sensenova.cn/v1';
        
        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            const generatedImage = document.getElementById('generatedImage');
            const downloadBtn = document.getElementById('downloadBtn');
            
            // 重置状态
            error.classList.remove('active');
            result.classList.remove('active');
            
            // 验证输入
            if (!prompt) {
                showError('请输入图片描述！');
                return;
            }
            
            // 设置加载状态
            generateBtn.disabled = true;
            generateBtn.textContent = '⏳ 生成中...';
            loading.classList.add('active');
            
            try {
                // 调用 AI 图片生成 API
                const response = await fetch(`${API_ENDPOINT}/images/generations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // 如果有API密钥，请取消下面这行的注释并填入你的密钥
                        // 'Authorization': 'Bearer YOUR_API_KEY',
                    },
                    body: JSON.stringify({
                        model: 'stable-diffusion',
                        prompt: prompt,
                        n: 1,
                        size: '1024x1024'
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP 错误！状态码: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.data && data.data[0] && data.data[0].url) {
                    const imageUrl = data.data[0].url;
                    generatedImage.src = imageUrl;
                    downloadBtn.href = imageUrl;
                    result.classList.add('active');
                } else {
                    throw new Error('API 返回的数据格式不正确');
                }
                
            } catch (err) {
                showError(`生成失败：${err.message}`);
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '✨ 生成图片';
                loading.classList.remove('active');
            }
        }
        
        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = '❌ ' + message;
            error.classList.add('active');
        }
        
        // 支持按 Ctrl+Enter 提交
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                generateImage();
            }
        });
    </script>
</body>
</html>
